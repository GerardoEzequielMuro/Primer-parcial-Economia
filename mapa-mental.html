# Economía I · Parcial 1

## Unidad 1. Introducción
### 1. Economía como ciencia
- Del griego *oikonomia* (casa + ley)
- Ciencia social · "de la elección"
- Objeto: necesidades ilimitadas vs recursos escasos
- Requisitos de ciencia
  - Objeto de estudio
  - Método
  - Validación
- Tipos de ciencias
  - Formales: Lógica, Matemática
  - Naturales: Física, Química
  - Sociales: Economía, Derecho
- Métodos
  - Hipotético-deductivo
  - Inductivo
  - Abductivo

### 2. Escasez y elegir
- Necesidades ilimitadas vs recursos limitados
- Elegir implica renunciar → costo de oportunidad
- 3 interrogantes básicos
  - ¿Qué producir?
  - ¿Cómo producir?
  - ¿Para quién producir?
- Ventajas comparativas

### 3. Necesidades
- Sensación de carencia + deseo
- Características
  - Ilimitadas
  - Recurrentes
  - Creables artificialmente
  - Complementarias
- Clasificación
  - Urgencia: primarias / secundarias
  - Asiduidad: regulares / ocasionales
  - Tiempo: presentes / futuras
  - Sujeto: individuales / colectivas
- Sujeto económico

### 4. Bienes y servicios
- Requisitos
  - Satisfacer necesidad
  - Ser escaso
  - Ser accesible
- Por naturaleza: materiales / inmateriales
- Por abundancia: libres / económicos / raros
- Por destino: consumo / producción
- Por durabilidad: durables / no durables
- Por propiedad: privados / públicos
- Por ingreso: normales / inferiores

### 5. Sistema económico
- Tipos
  - Capitalista / mercado
  - Planificación centralizada
  - Mixto
- Elementos
  - Bienes y servicios
  - Agentes
    - Familias
    - Empresas
    - Estado
  - Factores productivos
    - Tierra → renta
    - Trabajo → salario
    - Capital → interés
    - Tecnología → regalía
    - Empresarial → beneficio
  - Sectores
    - Primario
    - Secundario
    - Terciario
  - Mercados
    - De bienes y servicios
    - De factores
- Política económica
  - Fiscal
  - Monetaria
- Objetivos
  - Corto: empleo, precios, balanza
  - Largo: crecimiento, distribución

### 6. Flujo circular
- Flujo real: bienes y factores
- Flujo monetario: ingresos y precios
- Retribuciones
  - Trabajo → salarios
  - Capital → intereses
  - Tierra → rentas
  - Tecnología → regalías
  - Empresarial → beneficios

### 7. FPP
- Cantidad máxima posible
- Forma cóncava al origen
- Costo de oportunidad creciente
- Puntos
  - Sobre curva: eficiente
  - Interior: ineficiente
  - Exterior: inalcanzable
- Desplazamientos
  - Tecnología
  - Más recursos
  - Capital humano
  - Fuerza laboral

### 8. Modelos económicos
- Simplificación de la realidad
- Supuesto de racionalidad
- Ceteris paribus
- Categorías
  - Microeconómicos
  - Macroeconómicos
- Fases
  - Observar
  - Hipótesis
  - Contrastar

### 9. Positiva vs Normativa
- Positiva: qué ES
  - Descriptiva
  - Teoría económica
  - Ejemplo: si sube impuesto, baja consumo
- Normativa: qué DEBERÍA ser
  - Política económica
  - Juicios de valor
  - Ejemplo: debería proteger industria

### 10. PIB vs Ingreso Nacional
- PIB: territorio
- IN: nacionalidad del factor
- Fórmula: IN = PIB + RRN − RRE
- Argentino en Chile: IN sí, PIB no
- Chileno en Argentina: PIB sí, IN no

### 11. Equilibrio macro
- Demanda Agregada
  - Pendiente negativa
  - DA = C + I + G + (X − M)
- Oferta Agregada
  - Pendiente positiva
  - Empinada cerca de plena capacidad
- Equilibrio
  - Cruce OA y DA

## Unidad 2. Conducta del consumidor
### 1. Análisis del consumidor
- 3 supuestos
  - Preferencias coherentes
  - Maximización de utilidad
  - Restricción presupuestaria
- Insaciabilidad

### 2. Curva de indiferencia
- Combinaciones con misma utilidad
- Características
  - Convexas al origen
  - Pendiente negativa
  - No se cortan
  - Más alejada = más utilidad
- Mapa de indiferencia
  - Infinitas curvas
  - Único por consumidor

### 3. TMS decreciente
- Cuánto sacrifico de Y por 1 X más
- Pendiente de la CI
- Fórmula: TMS = −ΔY/ΔX = UMgx/UMgy
- Ley decreciente
  - Más X → UMgx baja
  - Menos Y → UMgy sube
- Justifica convexidad

### 4. Equilibrio del consumidor
- Tangencia CI + recta presupuestaria
- Condición: TMS = Px/Py
- UMg ponderadas: UMgx/Px = UMgy/Py

### 5. Restricción presupuestaria
- M = Px·Qx + Py·Qy
- Pendiente: −Px/Py
- Desplazamientos
  - Δ ingreso: paralelo
  - Δ un precio: rotación
  - Δ ambos proporcionales: paralelo

### 6. Demanda
- Ley: relación inversa P-Q
- Función: Q = D(P, Y, PB, G, N)
- Movimiento vs desplazamiento
  - Movimiento: cambia P
  - Desplazamiento: otros factores
- Factores que desplazan
  - Ingreso
  - Precios relacionados
  - Gustos
  - Tamaño de mercado
- Efecto sustitución
- Efecto ingreso

### 7. Excedente del consumidor
- Disposición a pagar − precio pagado
- Origen: UMg decreciente
- Ejemplo: 27 − 6 = 21

### 8. Elasticidad precio
- Ep = %ΔQ / %ΔP
- Clasificación
  - Elástica: Ep > 1 (lujo)
  - Unitaria: Ep = 1
  - Inelástica: Ep < 1 (necesidad)
  - Perf inelástica: Ep = 0 (insulina)
  - Perf elástica: Ep = ∞
- Factores
  - Tipo de necesidad
  - Sustitutos disponibles
  - % ingreso
  - Período
- Métodos de cálculo
  - Básica
  - Arco (punto medio)
  - En el punto
- Ingreso total
  - IT = P · Q
  - Máximo donde Ep = 1
- Elasticidad cruzada
  - Positiva: sustitutos
  - Negativa: complementarios
  - Nula: independientes
- Elasticidad ingreso
  - Ey > 1: lujo
  - 0 &lt; Ey &lt; 1: normal necesario
  - Ey &lt; 0: inferior
- Curva de Engel
  - Demanda vs ingreso
  - Segmentar mercado
- Marketing
  - Inelástica → subir precio
  - Elástica → branding
  - Ej: Apple, Rolex, Nike
